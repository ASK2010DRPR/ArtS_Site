<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой тестовый сайт</title>
    
    <!-- Иконка берётся из вашей папки, имя файла ico.svg -->
    <link rel="icon" href="ico.svg" type="image/svg+xml">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-direction: column;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .emoji {
            font-size: 5rem;
        }
    </style>
</head>
<body>
    <div class="emoji">🚀</div>
    <h1>Мой первый сайт!</h1>
    <p>Работает локально. Скоро зальём в GitHub.</p>
</body>
</html>
